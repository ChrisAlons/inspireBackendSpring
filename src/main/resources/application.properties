spring.application.name=inspireBackend

# Defaults map to compose.yaml values; override with env vars per environment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:myuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:secret}}
spring.datasource.driver-class-name=org.postgresql.Driver
server.port=${SERVER_PORT:8080}

# JPA/Hibernate properties
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.default_schema=clinica
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=UTC
spring.jpa.open-in-view=false

# Flyway
spring.flyway.schemas=clinica
spring.flyway.default-schema=clinica

# Docker Compose Integration (Spring Boot)
spring.docker.compose.enabled=true
spring.docker.compose.file=compose.yaml
spring.docker.compose.lifecycle-management=start_only

# JWT Configuration
jwt.secret=${JWT_SECRET:inspire-backend-secret-key-for-jwt-token-signing-must-be-at-least-256-bits-long-for-hs256}
jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}




