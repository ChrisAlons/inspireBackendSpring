spring.application.name=inspireBackend

# Defaults map to compose.yaml values; override with env vars per environment.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:${POSTGRES_PORT:5432}/${POSTGRES_DB:mydatabase}}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:${POSTGRES_USER:myuser}}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:${POSTGRES_PASSWORD:secret}}
spring.datasource.driver-class-name=org.postgresql.Driver

