info:
  name: 03 - Crear Paciente Mínimo (solo campos requeridos)
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/pacientes"
  headers:
    - name: Content-Type
      value: application/json
  body:
    type: json
    data: |-
      {
        "tipoDocumentoCodigo": "CE",
        "numeroDocumento": "000123456",
        "nombres": "Carlos",
        "apellidoPaterno": "Ramirez",
        "fechaNacimiento": "2000-03-10",
        "sexoCodigo": "M",
        "gradoInstruccionCodigo": "SECUNDARIA",
        "estadoCivilCodigo": "SOLTERO"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
