info:
  name: 09 - Listar todos los pacientes (paginado)
  type: http
  seq: 9

http:
  method: GET
  url: "{{baseUrl}}/api/pacientes?page=0&size=10&sort=createdAt,desc"
  params:
    - name: page
      value: "0"
      type: query
    - name: size
      value: "10"
      type: query
    - name: sort
      value: createdAt,desc
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
